<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Updater — Research Digest</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1419;
    --panel: #161d26;
    --panel-2: #1c2530;
    --border: #2a3441;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #3fb950;
    --accent-dim: #1f6feb;
    --danger: #f85149;
    --warn: #d29922;
    --mono: 'Cascadia Code', 'Consolas', 'SF Mono', monospace;
    --sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 13px;
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .brand { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .brand .dot { color: var(--accent); }
  .search {
    flex: 1; max-width: 360px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 5px;
    padding: 6px 10px; display: flex; align-items: center; gap: 6px;
  }
  .search input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--sans); font-size: 13px; }
  .search input::placeholder { color: var(--muted); }
  .btn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 14px; border-radius: 5px; cursor: pointer; font-family: var(--sans); font-size: 12px;
    display: flex; align-items: center; gap: 6px; transition: all .12s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .5; cursor: default; pointer-events: none; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #0a1f0f; font-weight: 600; }
  .btn.primary:hover { background: #4fd961; color: #0a1f0f; }
  .toggle { display: flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; user-select: none; font-size: 12px; }

  /* Body */
  .body { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 10px 0;
  }
  .sec-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 10px 14px 6px; }
  .cat-item {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 7px 14px; cursor: pointer; margin: 0 6px; border-radius: 5px;
    color: var(--text); font-size: 13px; transition: all .1s;
  }
  .cat-item:hover { background: var(--panel-2); }
  .cat-item.active { background: rgba(63,185,80,.14); color: var(--accent); }
  .cat-count { font-size: 11px; color: var(--muted); }
  .cat-item.active .cat-count { color: var(--accent); }
  .unread-badge {
    background: var(--accent-dim); color: #fff; font-size: 10px; border-radius: 8px;
    padding: 0 6px; min-width: 16px; text-align: center;
  }
  .nav-sep { height: 1px; background: var(--border); margin: 10px 14px; }
  .view-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; margin: 0 6px; border-radius: 5px; cursor: pointer; }
  .view-item:hover { background: var(--panel-2); }
  .view-item.active { background: rgba(31,111,235,.14); color: var(--accent-dim); }

  /* Main content */
  .main { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .article-list { display: flex; flex-direction: column; gap: 8px; max-width: 880px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 7px;
    padding: 12px 14px; transition: border-color .12s;
  }
  .card.unread { border-left: 3px solid var(--accent); }
  .card.read { opacity: .6; }
  .card-hdr { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); text-decoration: none; }
  .card-title:hover { color: var(--accent); }
  .card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .cat-pill { background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; font-size: 10px; }
  .card-snippet { color: var(--muted); font-size: 12px; line-height: 1.5; }
  .card-actions { margin-top: 8px; display: flex; gap: 8px; }
  .mini-btn {
    font-size: 11px; background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 9px; border-radius: 4px; cursor: pointer;
  }
  .mini-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Reports view */
  .report-list { display: flex; flex-direction: column; gap: 6px; max-width: 500px; }
  .report-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
  }
  .report-item:hover { border-color: var(--accent); }
  .report-body {
    max-width: 800px; background: var(--panel); border: 1px solid var(--border); border-radius: 7px;
    padding: 20px 24px; white-space: pre-wrap; font-family: var(--mono); font-size: 12.5px; line-height: 1.7;
  }
  .report-body a { color: var(--accent-dim); }

  /* Empty / loading */
  .state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 8px; color: var(--muted); }
  .state-icon { font-size: 40px; opacity: .4; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status bar */
  .statusbar {
    padding: 5px 16px; background: var(--panel); border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted); flex-shrink: 0; display: flex; gap: 14px;
  }

  /* Toast */
  #toasts { position: fixed; bottom: 20px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 9999; }
  .toast { background: var(--panel-2); border: 1px solid var(--border); border-radius: 5px; padding: 9px 14px; font-size: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.4); }
  .toast.success { border-left: 3px solid var(--accent); }
  .toast.error { border-left: 3px solid var(--danger); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a3441; border-radius: 4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot">●</span> Updater</div>
  <div class="search">
    <span style="color:var(--muted)">⌕</span>
    <input type="text" id="searchInput" placeholder="Search articles…" onkeydown="if(event.key==='Enter') loadArticles()">
  </div>
  <label class="toggle"><input type="checkbox" id="unreadToggle" onchange="loadArticles()"> Unread only</label>
  <button class="btn" id="fetchBtn" onclick="doFetch()">⟳ Fetch Now</button>
  <button class="btn primary" onclick="doReport()">📄 Generate Report</button>
</div>

<div class="body">
  <nav class="sidebar">
    <div class="sec-label">View</div>
    <div class="view-item active" id="viewArticles" onclick="switchView('articles')">📰 Articles</div>
    <div class="view-item" id="viewReports" onclick="switchView('reports')">📄 Reports</div>
    <div class="nav-sep"></div>
    <div class="sec-label">Categories</div>
    <div id="catList"></div>
  </nav>

  <main class="main" id="main">
    <div class="state-center"><div class="spinner"></div></div>
  </main>
</div>

<div class="statusbar">
  <span id="stStatus">Loading…</span>
</div>

<div id="toasts"></div>

<script>
let activeCategory = null, activeView = 'articles';

async function init() {
  await loadCategories();
  await loadArticles();
}

async function loadCategories() {
  const { categories } = await (await fetch('/api/categories')).json();
  const el = document.getElementById('catList');
  const allTotal = categories.reduce((s,c) => s + c.total, 0);
  const allUnread = categories.reduce((s,c) => s + c.unread, 0);
  let html = `<div class="cat-item ${!activeCategory ? 'active' : ''}" onclick="selectCategory(null)">
    <span>All</span>
    <span style="display:flex;align-items:center;gap:6px">
      ${allUnread ? `<span class="unread-badge">${allUnread}</span>` : ''}
      <span class="cat-count">${allTotal}</span>
    </span>
  </div>`;
  categories.forEach(c => {
    html += `<div class="cat-item ${activeCategory===c.key ? 'active' : ''}" onclick="selectCategory('${c.key}')">
      <span>${e(c.label)}</span>
      <span style="display:flex;align-items:center;gap:6px">
        ${c.unread ? `<span class="unread-badge">${c.unread}</span>` : ''}
        <span class="cat-count">${c.total}</span>
      </span>
    </div>`;
  });
  el.innerHTML = html;
}

function selectCategory(key) {
  activeCategory = key;
  switchView('articles');
  loadCategories();
  loadArticles();
}

function switchView(v) {
  activeView = v;
  document.getElementById('viewArticles').classList.toggle('active', v==='articles');
  document.getElementById('viewReports').classList.toggle('active', v==='reports');
  if (v === 'articles') loadArticles(); else loadReports();
}

async function loadArticles() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="state-center"><div class="spinner"></div></div>';

  const search = document.getElementById('searchInput').value.trim();
  const unreadOnly = document.getElementById('unreadToggle').checked;
  const params = new URLSearchParams();
  if (activeCategory) params.set('category', activeCategory);
  if (search) params.set('search', search);
  if (unreadOnly) params.set('unread_only', 'true');
  params.set('limit', '150');

  const { articles, count } = await (await fetch('/api/articles?' + params)).json();
  document.getElementById('stStatus').textContent = `${count} article(s)`;

  if (!articles.length) {
    main.innerHTML = `<div class="state-center"><div class="state-icon">📭</div><div>No articles yet. Click <strong>Fetch Now</strong> to pull the latest.</div></div>`;
    return;
  }

  main.innerHTML = `<div class="article-list">` + articles.map(a => `
    <div class="card ${a.read ? 'read' : 'unread'}" id="card-${a.id}">
      <div class="card-hdr">
        <a class="card-title" href="${e(a.url)}" target="_blank" rel="noopener" onclick="markRead(${a.id},true)">${e(a.title)}</a>
      </div>
      <div class="card-meta">
        <span class="cat-pill">${e(a.category)}</span>
        <span>${e(a.source)}</span>
        <span>${a.published_at ? new Date(a.published_at).toLocaleString() : ''}</span>
      </div>
      ${(a.summary || a.snippet) ? `<div class="card-snippet">${e(a.summary || a.snippet)}</div>` : ''}
      <div class="card-actions">
        <button class="mini-btn" onclick="markRead(${a.id}, ${a.read ? 'false' : 'true'})">${a.read ? 'Mark unread' : 'Mark read'}</button>
      </div>
    </div>
  `).join('') + `</div>`;
}

async function markRead(id, read) {
  await fetch(`/api/articles/${id}/read`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({read})
  });
  loadArticles();
  loadCategories();
}

async function doFetch() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true; btn.textContent = '⟳ Fetching…';
  try {
    const r = await fetch('/api/fetch', {method:'POST'});
    const d = await r.json();
    toast(`Fetched ${d.sources_fetched} source(s): ${d.total_new} new article(s)${d.sources_failed ? `, ${d.sources_failed} failed` : ''}`, d.sources_failed ? 'error' : 'success');
    loadCategories();
    loadArticles();
  } catch(ex) {
    toast('Fetch failed: ' + ex.message, 'error');
  }
  btn.disabled = false; btn.textContent = '⟳ Fetch Now';
}

async function doReport() {
  try {
    const r = await fetch('/api/report?days=1', {method:'POST'});
    const d = await r.json();
    toast(`Report saved: ${d.filename}`, 'success');
    switchView('reports');
  } catch(ex) {
    toast('Report generation failed: ' + ex.message, 'error');
  }
}

async function loadReports() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="state-center"><div class="spinner"></div></div>';
  const { reports } = await (await fetch('/api/reports')).json();
  if (!reports.length) {
    main.innerHTML = `<div class="state-center"><div class="state-icon">📄</div><div>No reports yet. Click <strong>Generate Report</strong>.</div></div>`;
    return;
  }
  main.innerHTML = `<div class="report-list">` + reports.map(r => `
    <div class="report-item" onclick="viewReport('${e(r.name)}')">
      <span>${e(r.name)}</span>
      <span style="color:var(--muted);font-size:11px">${new Date(r.modified*1000).toLocaleString()}</span>
    </div>
  `).join('') + `</div>`;
}

async function viewReport(name) {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="state-center"><div class="spinner"></div></div>';
  const text = await (await fetch('/api/reports/' + encodeURIComponent(name))).text();
  main.innerHTML = `<div style="max-width:800px"><button class="btn" onclick="loadReports()" style="margin-bottom:10px">← Back</button><div class="report-body">${e(text)}</div></div>`;
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function e(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

init();
</script>
</body>
</html>
